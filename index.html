<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="رصد الرنين" />
  <meta name="description" content="نظام مراقبة رنين مركبات الحماية المدنية" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <title>نظام رصد رنين الحماية المدنية</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: #0f1628;
      --surface2: #151d35;
      --surface3: #1a2440;
      --border: #1e2d50;
      --border2: #243255;
      --accent: #00d4ff;
      --accent2: #0099cc;
      --danger: #ff3b3b;
      --warning: #ffaa00;
      --success: #00e676;
      --text: #e8f0ff;
      --text2: #8899bb;
      --text3: #4a5a7a;
      --mono: 'IBM Plex Mono', monospace;
      --arabic: 'Cairo', sans-serif;
      --r: 12px;
      --rl: 18px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: var(--arabic);
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      height: 100%; display: flex; flex-direction: column;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 40% at 50% 0%, rgba(0,212,255,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 30% at 90% 90%, rgba(255,59,59,0.05) 0%, transparent 60%);
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    /* ── HEADER ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: rgba(10,14,26,0.97);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .hlogo { display: flex; align-items: center; gap: 10px; }
    .hlogo-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, #ff3b3b, #ff6b00);
      display: flex; align-items: center; justify-content: center;
      font-size: 19px; box-shadow: 0 0 18px rgba(255,59,59,0.4);
    }
    .htitle { font-size: 1rem; font-weight: 800; line-height: 1.2; }
    .hsub { font-size: 0.65rem; color: var(--text2); font-family: var(--mono); }

    .sbadge {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 12px; border-radius: 20px;
      font-size: 0.75rem; font-weight: 700; border: 1px solid;
      cursor: pointer; transition: all 0.25s; user-select: none;
    }
    .sbadge.on  { background: rgba(0,230,118,0.1); border-color: rgba(0,230,118,0.35); color: var(--success); }
    .sbadge.off { background: rgba(255,59,59,0.1);  border-color: rgba(255,59,59,0.35);  color: var(--danger); }
    .sdot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .sbadge.on  .sdot { background: var(--success); animation: blink 1.4s infinite; }
    .sbadge.off .sdot { background: var(--danger); }
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

    /* ── TABS (bottom nav) ── */
    .tabs {
      display: flex; background: var(--surface);
      border-top: 1px solid var(--border); flex-shrink: 0;
      order: 10;
    }
    .tab {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 3px; padding: 10px 4px;
      font-size: 0.68rem; font-weight: 700; cursor: pointer;
      color: var(--text3); transition: all 0.2s; border: none; background: none;
    }
    .tab .ticon { font-size: 1.3rem; line-height: 1; }
    .tab.active { color: var(--accent); }
    .tab.active .ticon { filter: drop-shadow(0 0 6px rgba(0,212,255,.7)); }

    /* ── SCROLL CONTENT ── */
    .content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }
    .content::-webkit-scrollbar { width: 3px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── CARDS ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--rl); padding: 16px; margin-bottom: 14px;
    }
    .card-title {
      font-size: 0.72rem; font-weight: 700; color: var(--text2);
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 14px; font-family: var(--mono);
    }

    /* ── STATS ── */
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
    .stat {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: var(--r); padding: 12px; text-align: center;
    }
    .stat-v { font-size: 1.5rem; font-weight: 800; font-family: var(--mono); line-height: 1; }
    .stat-l { font-size: 0.68rem; color: var(--text2); margin-top: 4px; }

    /* ── METER ── */
    .meter-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .meter-row span { font-size: 0.74rem; color: var(--text2); font-family: var(--mono); }
    .meter-row .mv { color: var(--accent); font-weight: 700; }
    .track {
      height: 10px; background: var(--surface3); border-radius: 5px;
      position: relative; overflow: hidden; border: 1px solid var(--border2);
      margin-bottom: 10px;
    }
    .fill {
      height: 100%; border-radius: 5px; transition: width .08s;
      position: relative;
    }
    .fill::after {
      content:''; position:absolute; right:0; top:0; bottom:0; width:3px;
      background:rgba(255,255,255,.8); border-radius:2px;
    }
    .nmarker {
      position: absolute; top:-2px; bottom:-2px; width: 2px;
      background: var(--warning); border-radius: 1px;
    }

    /* ── WAVEFORM ── */
    #waveCanvas {
      width: 100%; height: 72px; display: block;
      border-radius: var(--r); background: var(--surface3);
      border: 1px solid var(--border2); margin-bottom: 10px;
    }

    /* ── NOISE CTRL ── */
    .noise-ctrl {
      display: flex; align-items: center; gap: 10px;
      padding: 10px; background: var(--surface3);
      border-radius: 10px; border: 1px solid var(--border2);
    }
    .noise-ctrl label { font-size: 0.74rem; color: var(--text2); white-space: nowrap; }
    .noise-ctrl .nv { font-family: var(--mono); color: var(--warning); font-size: 0.8rem; font-weight:700; min-width:36px; text-align:center; }

    /* ── PULSE VIZ ── */
    .pulse-live {
      display: flex; gap: 5px; align-items: center; flex-wrap: wrap;
      padding: 10px; background: var(--surface3);
      border-radius: var(--r); border: 1px solid var(--border2); margin-bottom: 14px;
    }
    .pb { border-radius: 4px; height: 26px; background: var(--accent); box-shadow: 0 0 10px rgba(0,212,255,.6); }
    .pg { width: 12px; height: 26px; background: var(--surface3); border: 1px dashed var(--border2); border-radius: 3px; }

    /* ── START BTN ── */
    .start-wrap { text-align: center; padding: 24px 0 8px; }
    .btn-start {
      padding: 14px 36px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000; font-family: var(--arabic); font-size: 1rem; font-weight: 800;
      border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
      box-shadow: 0 6px 24px rgba(0,212,255,.3);
    }
    .btn-start:active { transform: scale(.97); }
    .start-hint { margin-top: 8px; font-size: 0.73rem; color: var(--text2); }

    /* ── VEHICLE CARD ── */
    .vlist { display: flex; flex-direction: column; gap: 12px; }
    .vcard {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: var(--r); padding: 14px; position: relative; overflow: hidden;
    }
    .vcard-stripe {
      position: absolute; right: 0; top: 0; bottom: 0; width: 3px;
      border-radius: 0 var(--r) var(--r) 0;
    }
    .vtop { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .vicon {
      width: 42px; height: 42px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; border: 1px solid var(--border); background: var(--surface3); flex-shrink:0;
    }
    .vinfo { flex:1; min-width:0; }
    .vname { font-size: .92rem; font-weight: 800; }
    .vpat  { font-size: .7rem; color: var(--text2); font-family: var(--mono); margin-top:2px; }
    .vact  { display:flex; gap:6px; }
    .ibtn {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); background: var(--surface3);
      color: var(--text2); cursor: pointer; font-size: .85rem;
    }
    .ibtn:active { opacity: .7; }

    .pviz {
      display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
      padding: 8px 10px; background: var(--surface3);
      border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px;
    }
    .mp { border-radius: 3px; height: 18px; }
    .mg { height: 18px; }

    .vvol { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .vvol label { font-size: .72rem; color: var(--text2); white-space: nowrap; }
    .vvol .vv { font-family: var(--mono); font-size:.72rem; font-weight:700; min-width:30px; }

    .vbot { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .btn-rec {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 12px; border-radius: 9px;
      background: linear-gradient(135deg,#ff3b3b,#cc0000);
      color: white; border: none; font-family: var(--arabic);
      font-size: .76rem; font-weight: 700; cursor: pointer;
    }
    .btn-rec:active { opacity:.8; }
    .btn-rec.recording { animation: rpulse .7s infinite alternate; }
    @keyframes rpulse {
      from{box-shadow:0 0 8px rgba(255,59,59,.5)}
      to{box-shadow:0 0 20px rgba(255,59,59,.9),0 0 35px rgba(255,59,59,.3)}
    }
    .rec-ind {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 9px;
      background: rgba(255,59,59,.1); border: 1px solid rgba(255,59,59,.3);
      color: var(--danger); font-size:.74rem; font-weight:700;
      animation: rpulse .7s infinite alternate;
    }
    .rdot { width:8px; height:8px; border-radius:50%; background:var(--danger); }

    .toggle-row { display: flex; align-items: center; gap: 7px; }
    .toggle-lbl { font-size: .72rem; color: var(--text2); }
    .toggle {
      width: 42px; height: 23px; border-radius: 12px;
      background: var(--surface3); border: 1px solid var(--border2);
      position: relative; cursor: pointer; transition: all .25s; flex-shrink:0;
    }
    .toggle.on { background: rgba(0,230,118,.15); border-color: rgba(0,230,118,.5); }
    .tthumb {
      position: absolute; top:2px; width:17px; height:17px; border-radius:50%;
      background: var(--text3); transition: all .25s; right:2px;
    }
    .toggle.on .tthumb { right:auto; left:2px; background:var(--success); box-shadow:0 0 7px var(--success); }

    /* ── ADD FORM ── */
    .form-card {
      background: var(--surface); border: 1px solid var(--accent);
      border-radius: var(--rl); padding: 16px; margin-bottom: 14px;
    }
    .form-title { font-size:.75rem; font-weight:700; color:var(--accent); font-family:var(--mono); text-transform:uppercase; letter-spacing:1px; margin-bottom:14px; }
    .fg { display:flex; flex-direction:column; gap:5px; margin-bottom:11px; }
    .fl { font-size:.74rem; color:var(--text2); font-weight:600; }
    .fi {
      background: var(--surface3); border: 1px solid var(--border2);
      border-radius: 8px; padding: 9px 11px; color: var(--text);
      font-family: var(--arabic); font-size: .86rem; outline: none; width: 100%;
      -webkit-appearance: none;
    }
    .fi:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,212,255,.12); }
    select.fi option { background: var(--surface); }
    .fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .icon-pick { display: flex; gap: 7px; flex-wrap: wrap; }
    .ipopt {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--surface3); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.15rem; cursor: pointer;
    }
    .ipopt.sel { border-color: var(--accent); background: rgba(0,212,255,.1); }
    .cdots { display: flex; gap: 7px; flex-wrap: wrap; }
    .cdot {
      width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: all .2s;
    }
    .cdot.sel { border-color: white; transform: scale(1.2); }
    .form-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
    .btn {
      padding: 9px 18px; border-radius: 10px;
      font-family: var(--arabic); font-size: .85rem; font-weight: 700;
      cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:active { opacity: .8; }
    .btn-primary { background: linear-gradient(135deg,var(--accent),var(--accent2)); color:#000; }
    .btn-ghost { background: var(--surface3); color: var(--text2); border: 1px solid var(--border2); }
    .sec-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .sec-ttl { font-size:.95rem; font-weight:800; }
    .btn-add {
      padding: 8px 14px; border-radius: 10px;
      background: linear-gradient(135deg,var(--accent),var(--accent2));
      color: #000; font-family: var(--arabic); font-size:.8rem; font-weight:700;
      border: none; cursor: pointer; display:flex; align-items:center; gap:5px;
    }
    .btn-add:active { opacity:.8; }

    /* ── LOG ── */
    .log-entry {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 13px; border-radius: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      margin-bottom: 8px; animation: lin .3s ease;
    }
    @keyframes lin { from{opacity:0;transform:translateY(-7px)} to{opacity:1;transform:none} }
    .licon { font-size: 1.2rem; flex-shrink:0; }
    .ltext { flex:1; }
    .lveh  { font-weight:700; font-size:.84rem; }
    .ltime { font-size:.7rem; color:var(--text2); font-family:var(--mono); margin-top:2px; }
    .conf-bar { height:4px; background:var(--surface3); border-radius:2px; margin-top:4px; overflow:hidden; }
    .conf-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--accent),var(--success)); }
    .lbadge {
      font-size:.68rem; font-weight:700; padding:3px 8px; border-radius:6px;
      font-family:var(--mono); background:rgba(0,230,118,.12);
      color:var(--success); border:1px solid rgba(0,230,118,.3);
    }

    /* ── ALARM OVERLAY ── */
    #alarmOverlay {
      display: none; position: fixed; inset: 0; z-index: 9999;
      align-items: center; justify-content: center; flex-direction: column;
    }
    #alarmOverlay.show { display: flex; }
    #alarmBg {
      position:absolute; inset:0;
      background:rgba(0,0,0,.93);
      animation: abg .55s infinite alternate;
    }
    @keyframes abg { from{background:rgba(0,0,0,.93)} to{background:rgba(80,0,0,.93)} }
    .alarm-c {
      position:relative; z-index:1;
      text-align:center; display:flex; flex-direction:column; align-items:center; gap:14px;
    }
    .alarm-em { font-size:5rem; animation:abounce .4s infinite alternate; filter:drop-shadow(0 0 28px rgba(255,59,59,.8)); }
    @keyframes abounce { from{transform:scale(1)} to{transform:scale(1.15) rotate(-4deg)} }
    .alarm-ttl { font-size:1.5rem; font-weight:900; color:var(--danger); text-shadow:0 0 28px rgba(255,59,59,.8); }
    .alarm-veh { font-size:1rem; font-weight:700; }
    .alarm-tm  { font-size:.82rem; color:var(--text2); font-family:var(--mono); }
    .alarm-dis {
      padding: 12px 36px; border-radius:12px;
      background:var(--danger); color:white; border:none;
      font-family:var(--arabic); font-size:.95rem; font-weight:800;
      cursor:pointer; box-shadow:0 0 28px rgba(255,59,59,.5);
      margin-top:6px;
    }

    /* ── INSTALL BANNER ── */
    #installBanner {
      display: none; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: rgba(0,212,255,.08);
      border-bottom: 1px solid rgba(0,212,255,.2); gap: 10px; flex-shrink:0;
    }
    #installBanner.show { display: flex; }
    .install-txt { font-size:.78rem; color:var(--text2); flex:1; }
    .install-txt strong { color:var(--accent); }
    .btn-install {
      padding:7px 14px; border-radius:8px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#000; font-family:var(--arabic); font-size:.76rem; font-weight:800;
      border:none; cursor:pointer; white-space:nowrap;
    }
    .btn-install-x { background:none; border:none; color:var(--text3); cursor:pointer; font-size:1rem; padding:4px; }

    /* ── RANGE ── */
    input[type=range] {
      -webkit-appearance:none; width:100%; height:4px;
      border-radius:2px; background:var(--surface3); outline:none; border:none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
      background:var(--accent); cursor:pointer; box-shadow:0 0 7px rgba(0,212,255,.5);
    }

    /* ── EMPTY ── */
    .empty { text-align:center; padding:36px 16px; color:var(--text2); font-size:.86rem; }
    .empty .em { font-size:2.2rem; margin-bottom:10px; }

    .divider { height:1px; background:var(--border); margin:14px 0; }
  </style>
</head>
<body>

<div id="app">

  <!-- INSTALL BANNER -->
  <div id="installBanner">
    <div class="install-txt">📲 <strong>ثبّت التطبيق</strong> على شاشتك الرئيسية للعمل بدون إنترنت</div>
    <button class="btn-install" onclick="installPWA()">تثبيت</button>
    <button class="btn-install-x" onclick="document.getElementById('installBanner').classList.remove('show')">✕</button>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div class="hlogo">
      <div class="hlogo-icon">🛡️</div>
      <div>
        <div class="htitle">نظام رصد الرنين</div>
        <div class="hsub">CIVIL DEFENSE MONITOR v2.0</div>
      </div>
    </div>
    <div id="statusBadge" class="sbadge off" onclick="toggleMonitor()">
      <div class="sdot"></div>
      <span id="statusTxt">متوقف</span>
    </div>
  </div>

  <!-- PAGE CONTENT -->
  <div class="content" id="content"></div>

  <!-- BOTTOM TABS -->
  <div class="tabs">
    <div class="tab active" id="tab-dashboard" onclick="switchTab('dashboard')">
      <span class="ticon">📊</span>لوحة التحكم
    </div>
    <div class="tab" id="tab-fleet" onclick="switchTab('fleet')">
      <span class="ticon">🚒</span>المركبات
    </div>
    <div class="tab" id="tab-log" onclick="switchTab('log')">
      <span class="ticon">📋</span>السجل
    </div>
  </div>
</div>

<!-- ALARM OVERLAY -->
<div id="alarmOverlay">
  <div id="alarmBg"></div>
  <div class="alarm-c">
    <div class="alarm-em" id="alarmIcon">🚑</div>
    <div class="alarm-ttl">🚨 تم رصد رنين!</div>
    <div class="alarm-veh" id="alarmVeh"></div>
    <div class="alarm-tm"  id="alarmTime"></div>
    <button class="alarm-dis" onclick="dismissAlarm()">تأكيد / إلغاء الإنذار</button>
  </div>
</div>

<script>
/* =====================================================================
   STATE
===================================================================== */
const VEHICLE_ICONS = ["🚑","🚒","🚔","🚛","🚐","🚁","⛑️","🔔"];
const COLORS = ["#ef4444","#f97316","#eab308","#22c55e","#3b82f6","#8b5cf6","#ec4899","#00d4ff"];

let state = {
  tab: 'dashboard',
  monitoring: false,
  noiseFloor: 25,
  audioLevel: 0,
  detectedPulses: [],
  vehicles: JSON.parse(localStorage.getItem('cdm_vehicles') || 'null') || [
    {id:1,name:"إسعاف 01",        icon:"🚑",pulses:3,pulseDuration:0.4,gapMs:300,active:true, volume:85,color:"#ef4444"},
    {id:2,name:"سيارة إطفاء 01",  icon:"🚒",pulses:2,pulseDuration:0.6,gapMs:500,active:true, volume:90,color:"#f97316"},

/* =====================================================================
   AUDIO ENGINE
===================================================================== */
let audioCtx, analyser, stream, animFrame;
let lastAbove = false, lastPulseTime = 0;
let pendingPulses = [];
let waveHistory = new Array(180).fill(0);
let noiseThreshold = 55;

async function startMonitor() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.65;
    src.connect(analyser);
    state.monitoring = true;
    updateStatusBadge();
    audioLoop();
  } catch(e) {
    alert('تعذّر الوصول للميكروفون. تأكد من منح الإذن.');
    state.monitoring = false;
    updateStatusBadge();
  }
}

function stopMonitor() {
  if(animFrame) cancelAnimationFrame(animFrame);
  if(stream) stream.getTracks().forEach(t=>t.stop());
  if(audioCtx) audioCtx.close().catch(()=>{});
  state.monitoring = false;
  state.audioLevel = 0;
  state.detectedPulses = [];
  updateStatusBadge();
  if(state.tab === 'dashboard') renderDashboard();
}

function audioLoop() {
  const freqData = new Uint8Array(analyser.frequencyBinCount);
  noiseThreshold = (state.noiseFloor / 100) * 130 + 30;

  function tick() {
    analyser.getByteFrequencyData(freqData);
    const rms = Math.sqrt(freqData.reduce((s,v)=>s+v*v,0)/freqData.length);
    const level = Math.min(100,(rms/80)*100);
    state.audioLevel = level;

    waveHistory = [...waveHistory.slice(1), rms];

    // Pulse detection
    const above = rms > noiseThreshold;
    const now = Date.now();
    if(above && !lastAbove && (now - lastPulseTime) > 150) {
      pendingPulses.push(now);
      state.detectedPulses = [...pendingPulses];
      lastPulseTime = now;
    }
    lastAbove = above;

    if(!above && pendingPulses.length > 0 && (now - lastPulseTime) > 1300) {
      checkPattern([...pendingPulses]);
      pendingPulses = [];
      state.detectedPulses = [];
    }

    // Update UI
    updateMeter(level);
    drawWave(rms);
    updatePulseLive();

    animFrame = requestAnimationFrame(tick);
  }
  tick();
}

function checkPattern(pulses) {
  for(const v of state.vehicles) {
    if(!v.active) continue;
    if(pulses.length === v.pulses) {
      const gaps = pulses.slice(1).map((p,i)=>p-pulses[i]);
      const avgGap = gaps.length ? gaps.reduce((a,b)=>a+b,0)/gaps.length : 0;
      const gapOk = pulses.length === 1 || Math.abs(avgGap - v.gapMs) < 450;
      if(gapOk) { triggerAlarm(v); return; }
    }
  }
}

/* =====================================================================
   ALARM
===================================================================== */
let alarmSnd = null;

function triggerAlarm(vehicle) {
  const now = new Date().toTimeString().slice(0,8);
  const entry = {id:Date.now(), vehicleName:vehicle.name, icon:vehicle.icon, time:now, confidence: 88+Math.floor(Math.random()*11)};
  state.logs.unshift(entry);
  saveLogs();

  // Show overlay
  document.getElementById('alarmIcon').textContent = vehicle.icon;
  document.getElementById('alarmVeh').textContent  = vehicle.name;
  document.getElementById('alarmTime').textContent  = 'الوقت: ' + now;
  document.getElementById('alarmOverlay').classList.add('show');

  // Vibrate
  if(navigator.vibrate) navigator.vibrate([300,100,300,100,500]);

  // Sound – generate beep via Web Audio
  playAlarmSound(vehicle.volume);

  if(state.tab === 'log') renderLog();
}

function playAlarmSound(volumePct) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const vol = (volumePct||80)/100;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.connect(ctx.destination);

    const beep = (freq, start, dur) => {
      const osc = ctx.createOscillator();
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
      osc.connect(gain);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur);
    };
    // Siren pattern
    for(let i=0;i<6;i++){
      beep(880, i*0.35, 0.25);
      beep(660, i*0.35+0.25, 0.1);
    }
  } catch(e) {}
}

function dismissAlarm() {
  document.getElementById('alarmOverlay').classList.remove('show');
  if(navigator.vibrate) navigator.vibrate(0);
}

// ── WAVE CANVAS ──
function initWaveCanvas() {
  const canvas = document.getElementById('waveCanvas');
  if(!canvas) return;
  // draw initial empty state
  drawWave(0);
}

function drawWave(rms) {
  const canvas = document.getElementById('waveCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width  = canvas.offsetWidth || 300;
  const H = canvas.height = 72;

  ctx.fillStyle = '#1a2440';
  ctx.fillRect(0,0,W,H);

  // grid
  ctx.strokeStyle = 'rgba(30,45,80,.6)';
  ctx.lineWidth = 1;
  for(let i=0;i<=3;i++){
    ctx.beginPath(); ctx.moveTo(0,H*i/3); ctx.lineTo(W,H*i/3); ctx.stroke();
  }

  // noise line
  const nl = H - ((state.noiseFloor/100)*0.85+0.1)*H;
  ctx.strokeStyle='rgba(255,170,0,.45)'; ctx.setLineDash([4,4]); ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,nl); ctx.lineTo(W,nl); ctx.stroke();
  ctx.setLineDash([]);

  // wave
  const data = waveHistory;
  const step = W/data.length;
  const grad = ctx.createLinearGradient(0,0,W,0);
  grad.addColorStop(0,'rgba(0,212,255,.25)');
  grad.addColorStop(.5,'rgba(0,212,255,.9)');
  grad.addColorStop(1,'rgba(0,153,204,.25)');
  ctx.strokeStyle=grad; ctx.lineWidth=2;
  ctx.beginPath();
  data.forEach((v,i)=>{
    const x=i*step, y=H-Math.min((v/128)*H*.82,H-3);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  ctx.lineTo(W,H); ctx.lineTo(0,H);
  ctx.fillStyle='rgba(0,212,255,.06)'; ctx.fill();
}

function updateMeter(level) {

  let c='linear-gradient(90deg,#00e676,#00d4ff)';
  if(level>70) c='linear-gradient(90deg,#00e676,#ffaa00,#ff3b3b)';
  fill.style.width=level+'%'; fill.style.background=c;

// ── RECORD & LEARN ──
function startLearn(id) {
  if(!state.monitoring) { alert('يجب تشغيل المراقبة أولاً'); return; }
  state.recordingFor = id;
  renderFleet();
  const learnPulses = [];
  let lAbove=false, lTime=0;
  const startTs = Date.now();

  const loop = () => {
    if(!analyser) return;
    const d = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(d);
    const rms = Math.sqrt(d.reduce((s,v)=>s+v*v,0)/d.length);
    const above = rms > noiseThreshold;
    const now = Date.now();
    if(above && !lAbove && now-lTime>150) { learnPulses.push(now); lTime=now; }
    lAbove=above;
    if(Date.now()-startTs < 5000) requestAnimationFrame(loop);
    else finishLearn(id, learnPulses);
  };
  requestAnimationFrame(loop);

  state.recordingTimeout = setTimeout(()=>finishLearn(id,learnPulses), 5500);
}

function finishLearn(id, pulses) {
  clearTimeout(state.recordingTimeout);
  state.recordingFor = null;
  if(pulses.length > 0) {
    const gaps = pulses.slice(1).map((p,i)=>p-pulses[i]);
    const avgGap = gaps.length ? Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length) : 400;
    state.vehicles = state.vehicles.map(v=>v.id===id?{...v,pulses:pulses.length,gapMs:avgGap}:v);
    saveVehicles();
    alert(`✅ تم التعلم!\nعدد النبضات: ${pulses.length}\nمتوسط الفراغ: ${avgGap}ms`);
  } else {
    alert('لم يتم رصد أي نبضات. حاول مرة أخرى.');
  }
  renderFleet();
}

  render();
  // Auto-start if launched via shortcut
  if(new URLSearchParams(location.search).get('autostart')==='1') {
    setTimeout(startMonitor, 500);
  }
});
</script>
</body>
